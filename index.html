<!DOCTYPE html>
<html>
<head>
    <title>Renew-a-Bit: Energy Simulation</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px-8px rgba(0,0,0,0.1); }
        .stats { display: flex; justify-content: space-around; margin: 20px 0; font-weight: bold; }
        .pool { border: 2px solid #333; height: 100px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; margin-bottom: 20px; padding: 10px; border-radius: 8px; }
        .bead { width: 15px; height: 15px; margin: 2px; border-radius: 50%; display: inline-block; }
        .non { background: #333; } /* Fossil Fuel */
        .ren { background: #4CAF50; } /* Renewable */
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #2196F3; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Renew-a-Bit Simulation</h1>
        <p>Your goal: Manage your energy pool. Non-renewables (Black) disappear. Renewables (Green) return to the pool.</p>
        
        <div class="pool" id="poolDisplay"></div>

        <div class="stats">
            <div>Year: <span id="yearNum">0</span></div>
            <div>Remaining Units: <span id="totalNum">100</span></div>
        </div>

        <div id="controls">
            <label>Units to extract: </label>
            <input type="number" id="extractAmount" value="10" min="1">
            <button onclick="runYear()" id="runBtn">Run Next Year</button>
        </div>

        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Extracted</th>
                    <th>Remaining (Non)</th>
                    <th>Remaining (Ren)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let nonRenewable = 92;
        let renewable = 8;
        let year = 0;

        function updateDisplay() {
            document.getElementById('yearNum').innerText = year;
            document.getElementById('totalNum').innerText = nonRenewable + renewable;
            const pool = document.getElementById('poolDisplay');
            pool.innerHTML = '';
            for(let i=0; i<nonRenewable; i++) pool.innerHTML += '<div class="bead non"></div>';
            for(let i=0; i<renewable; i++) pool.innerHTML += '<div class="bead ren"></div>';
        }

        function runYear() {
            let toExtract = parseInt(document.getElementById('extractAmount').value);
            let total = nonRenewable + renewable;
            if (total <= 0) return;

            year++;
            let extractedNon = 0;
            let extractedRen = 0;

            for(let i=0; i < toExtract; i++) {
                let currentTotal = nonRenewable + renewable;
                if (currentTotal <= 0) break;
                
                let chance = Math.random() * currentTotal;
                if (chance < nonRenewable) {
                    nonRenewable--;
                    extractedNon++;
                } else {
                    renewable--;
                    extractedRen++;
                }
            }

            // Renewable units are replenished (returned to the bag)
            renewable += extractedRen;

            const table = document.getElementById('resultsTable').getElementsByTagName('tbody')[0];
            let row = table.insertRow();
            row.insertCell(0).innerText = year;
            row.insertCell(1).innerText = toExtract;
            row.insertCell(2).innerText = nonRenewable;
            row.insertCell(3).innerText = renewable;

            updateDisplay();
            if (nonRenewable <= 0) {
                document.getElementById('runBtn').disabled = true;
                alert("CRISIS: Your non-renewable energy is depleted!");
            }
        }
        updateDisplay();
    </script>
</body>
</html>
