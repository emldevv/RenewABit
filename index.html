<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Renew-a-Bit: Dual-Mode Simulation</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f4f7; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .pool { border: 3px solid #bdc3c7; min-height: 120px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; margin: 20px 0; padding: 15px; border-radius: 12px; background: #fff; }
        .bead { width: 16px; height: 16px; margin: 3px; border-radius: 50%; display: inline-block; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3); }
        .non { background: #2c3e50; } /* Fossil Fuel */
        .ren { background: #27ae60; } /* Renewable */
        .controls { background: #eef2f3; padding: 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #d1d8e0; }
        input { width: 80px; padding: 10px; font-size: 18px; border: 2px solid #3498db; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 24px; font-size: 14px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; text-transform: uppercase; }
        #plannedBtn { background: #3498db; color: white; }
        #plannedBtn:hover { background: #2980b9; }
        #blindBtn { background: #8e44ad; color: white; }
        #blindBtn:hover { background: #7d3c98; }
        #resetBtn { background: #e74c3c; color: white; }
        #resetBtn:hover { background: #c0392b; }
        button:disabled { background: #bdc3c7 !important; cursor: not-allowed; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; font-size: 1.1em; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .log-box { font-weight: bold; margin-top: 15px; padding: 10px; border-radius: 5px; min-height: 24px; }
        .mode-planned { color: #3498db; background: #ebf5fb; }
        .mode-blind { color: #8e44ad; background: #f5eef8; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { background: #34495e; color: white; padding: 12px; border: 1px solid #2c3e50; }
        td { border: 1px solid #bdc3c7; padding: 10px; text-align: center; }
        .crisis { color: #e74c3c; font-weight: bold; font-size: 1.4em; display: none; margin-top: 20px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    </style>
</head>
<body>
    <div class="container">
        <h1>Energy Depletion Simulation</h1>
        <p>Resource Mix: 92% Non-Renewable (Black) | 8% Renewable (Green)</p>
        
        <div class="pool" id="poolDisplay"></div>

        <div class="controls">
            <strong>Units to Extract (per Worksheet):</strong><br>
            <input type="number" id="extractAmount" value="10" min="1"><br>
            <div class="btn-group">
                <button onclick="consume('planned')" id="plannedBtn">1. Planned Consumption (Guided)</button>
                <button onclick="consume('blind')" id="blindBtn">2. Blind Consumption (The Blindfold)</button>
                <button onclick="resetSimulation()" id="resetBtn">Reset</button>
            </div>
            <div id="logArea" class="log-box">Select a mode to begin.</div>
            <div id="crisisMsg" class="crisis">⚠️ ALERT: ENERGY DEPLETED</div>
        </div>

        <div class="stats-grid">
            <div>Year: <span id="yearNum">0</span></div>
            <div>Non-Ren: <span id="nonNum">92</span></div>
            <div>Renewable: <span id="renNum">8</span></div>
            <div>Total: <span id="totalNum">100</span></div>
        </div>

        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Mode</th>
                    <th>Extracted</th>
                    <th>% Non-Ren Left</th>
                    <th>% Renewable Left</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let nonRenewable = 92;
        let renewable = 8;
        let year = 0;

        function updateDisplay() {
            document.getElementById('yearNum').innerText = year;
            document.getElementById('nonNum').innerText = nonRenewable;
            document.getElementById('renNum').innerText = renewable;
            document.getElementById('totalNum').innerText = nonRenewable + renewable;
            
            const pool = document.getElementById('poolDisplay');
            pool.innerHTML = '';
            for(let i=0; i<nonRenewable; i++) pool.innerHTML += '<div class="bead non"></div>';
            for(let i=0; i<renewable; i++) pool.innerHTML += '<div class="bead ren"></div>';
        }

        function consume(mode) {
            let toExtract = parseInt(document.getElementById('extractAmount').value);
            if (isNaN(toExtract) || toExtract <= 0 || nonRenewable <= 0) return;

            year++;
            let pulledNon = 0;
            let pulledRen = 0;

            if (mode === 'planned') {
                // Strategic Mode: Extracts beads according to the exact current ratio
                for(let i=0; i < toExtract; i++) {
                    let total = nonRenewable + renewable;
                    if (total <= 0) break;
                    if (nonRenewable / total > Math.random()) { // Still has some probability but follows the math
                         nonRenewable--; pulledNon++;
                    } else {
                         renewable--; pulledRen++;
                    }
                }
                document.getElementById('logArea').className = "log-box mode-planned";
                document.getElementById('logArea').innerText = `PLANNED MODE: Following the chart.`;
            } else {
                // Blindfold Mode: Full randomized "grab"
                for(let i=0; i < toExtract; i++) {
                    let total = nonRenewable + renewable;
                    if (total <= 0) break;
                    let roll = Math.random() * total;
                    if (roll < nonRenewable) {
                        nonRenewable--; pulledNon++;
                    } else {
                        renewable--; pulledRen++;
                    }
                }
                document.getElementById('logArea').className = "log-box mode-blind";
                document.getElementById('logArea').innerText = `BLIND MODE: You grabbed ${pulledNon} Black and ${pulledRen} Green.`;
            }

            // RULE: Renewable units are ALWAYS returned to the pool [cite: 40]
            renewable += pulledRen;

            let totalAfter = nonRenewable + renewable;
            let nonPerc = ((nonRenewable / totalAfter) * 100).toFixed(1);
            let renPerc = ((renewable / totalAfter) * 100).toFixed(1);

            const table = document.getElementById('resultsTable').querySelector('tbody');
            let row = table.insertRow();
            row.innerHTML = `<td>${year}</td><td>${mode.toUpperCase()}</td><td>${toExtract}</td><td>${nonPerc}%</td><td>${renPerc}%</td>`;

            updateDisplay();

            if (nonRenewable <= 0) {
                document.getElementById('plannedBtn').disabled = true;
                document.getElementById('blindBtn').disabled = true;
                document.getElementById('crisisMsg').style.display = 'block';
            }
        }

        function resetSimulation() {
            nonRenewable = 92; renewable = 8; year = 0;
            document.getElementById('resultsTable').querySelector('tbody').innerHTML = '';
            document.getElementById('plannedBtn').disabled = false;
            document.getElementById('blindBtn').disabled = false;
            document.getElementById('crisisMsg').style.display = 'none';
            document.getElementById('logArea').className = "log-box";
            document.getElementById('logArea').innerText = 'Select a mode to begin.';
            document.getElementById('extractAmount').value = 10;
            updateDisplay();
        }
        updateDisplay();
    </script>
</body>
</html>
